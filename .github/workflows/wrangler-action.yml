name: Deploy Worker

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

# Run JS-based actions (checkout, cache, setup-node, wrangler-action) on the
# Node 24 runtime — Node 20 is deprecated and forced off mid-2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Restore API/image cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: api-cache-${{ github.run_id }}
          restore-keys: api-cache-
      - name: Build project
        run: pnpm build
        env:
          PUBLIC_LASTFM_API_KEY: ${{ secrets.PUBLIC_LASTFM_API_KEY }}
          PUBLIC_LASTFM_USERNAME: ${{ vars.PUBLIC_LASTFM_USERNAME }}
          ANILIST_USERNAME: ${{ vars.ANILIST_USERNAME }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_USERNAME: ${{ vars.TRAKT_USERNAME }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          GH_USERNAME: ${{ vars.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          HARDCOVER_TOKEN: ${{ secrets.HARDCOVER_TOKEN }}
      - name: Build & Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
